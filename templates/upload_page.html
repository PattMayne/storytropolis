<!doctype html>
<html class="no-js" lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ texts.title }}</title>
        <link rel="icon" type="image/x-icon" href="/static/img/guy_icon.png">
        <link rel="stylesheet" href="/static/css/foundation.min.css">
        <link rel="stylesheet" href="/static/css/app.css?id=14029">
    </head>

    <body>
    {% include "header.html" %}

    <div class="grid-container">
        <div class="grid-x grid-padding-x">
            <div class="large-7 medium-10 small-12 cell">
                <div class="callout">
                    <h1>{{ texts.title }}</h1>
                    <label for="filename">Choose filename (don't include extension, ie ".png")
                        <input type="text" id="filename" placeholder="filename" />
                    </label>

                    <label for="img_upload">Upload a cover image:
                        <input
                            type="file"
                            id="img_upload"
                            name="img_upload"
                            accept="image/png, image/jpeg"
                        />
                    </label>
                </div>

                <a class="button small" id="submit_button">SUBMIT</a>

                <div class="callout primary hidden" id="msg_box">
                </div>
            </div>

        </div> <!-- end of grid-x -->

    </div><!-- end of grid-container -->

        <script src="/static/js/vendor/jquery.js"></script>
        <script src="/static/js/vendor/what-input.js"></script>
        <script src="/static/js/vendor/foundation.min.js"></script>
        <script type="module" src="/static/js/app.js?id=7"></script>
        <script type="module" src="/static/js/upload_form.js?id=5"></script>
    </body>

</html>

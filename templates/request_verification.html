<!doctype html>
<html class="no-js" lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ texts.title }}</title>
        <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
        <link rel="stylesheet" href="/static/css/foundation.min.css">
        <link rel="stylesheet" href="/static/css/app.css?id=5">
    </head>

    <body>
    {% include "header.html" %}

    <div class="grid-container">
        <div class="grid-x grid-padding-x">
            <div class="large-12 cell">
                <h1>{{ texts.title }}</h1>
                <p>{{ texts.message }}</p>
            </div>

            <div class="large-12 cell">
                <div class="callout">
                    <div class="grid-x grid-padding-x">
                        <div class="large-4 medium-3 cell hide-for-small-only">
                            &nbsp;
                        </div>
                        <div class="large-4 medium-6 small-12 cell">

                            <h4>{{ texts.title }}</h4>

                            <label for="email_req">
                                {{ texts.email }}
                                <input
                                    id="email_req"
                                    name="email_req"
                                    type="text" />
                            </label>

                            <a class="button small"
                                id="submit_btn">{{ texts.submit_btn }}</a>
                            <p>Not a member yet? <a href="/auth/register">Register.</a></p>

                        </div>
                        <div class="large-4 medium-3 cell hide-for-small-only">
                            &nbsp;
                        </div>
                    </div>
               </div>

                <div class="callout primary hidden" id="msg_box">
                </div>

            </div>
        </div> <!-- end of grid-x -->

    </div><!-- end of grid-container -->            

        <script src="/static/js/vendor/jquery.js"></script>
        <script src="/static/js/vendor/what-input.js"></script>
        <script src="/static/js/vendor/foundation.min.js"></script>
        <script type="module" src="/static/js/app.js?id=7"></script>
        <script type="module" src="/static/js/request_verification.js?id=59"></script>
    </body>

</html>

<!doctype html>
<html class="no-js" lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ texts.title }}</title>
        <link rel="icon" type="image/x-icon" href="/static/img/guy_icon.png">
        <link rel="stylesheet" href="../static/css/foundation.min.css">
        <link rel="stylesheet" href="../static/css/app.css?id=9">
    </head>

    <body>
    {% include "header.html" %}

    <div class="article_wrapper">
        {% if posts.len() > 0 %}
        {% for post in posts %}
        {% if !post.is_pinned() %}
            <article class="article">
                <h2 class="article_title bold_text">{{ post.title }}</h2>
                <p class="italics">{{ post.get_formatted_updated_timestamp() }}</p>
                <hr>
                <p>{{ post.body | safe }}</p>
            </article>
        {% endif %}
        {% endfor %}
        {% else %}
        [NONE]
        {% endif %}
    </div>

        <script src="../static/js/vendor/jquery.js"></script>
        <script src="../static/js/vendor/what-input.js"></script>
        <script type="module" src="../static/js/app.js?id=7"></script>
        <script src="../static/js/vendor/foundation.min.js"></script>

    </body>

</html>
